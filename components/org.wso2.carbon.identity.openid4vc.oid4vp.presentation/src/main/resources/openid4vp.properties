##############################################################################
# OpenID4VP (OpenID for Verifiable Presentations) Configuration
# WSO2 Identity Server
##############################################################################

# ============================================================================
# VP Request Configuration
# ============================================================================

# Expiry time for VP requests in seconds (default: 300 = 5 minutes)
OpenID4VP.VPRequestExpirySeconds=300

# Default presentation definition ID to use when none is specified
# OpenID4VP.DefaultPresentationDefinitionId=default-pres-def

# ============================================================================
# Response Mode Configuration
# ============================================================================

# Enable request_uri mode for authorization requests (default: true)
# When enabled, the authorization request will use request_uri to fetch the full request
OpenID4VP.EnableRequestUri=true

# Enable JWT signing for request objects (default: false)
# When enabled, authorization requests will be signed as JWTs
OpenID4VP.EnableRequestJWT=false

# ============================================================================
# Signing Configuration
# ============================================================================

# Algorithm to use for signing JWTs (default: RS256)
# Supported: RS256, RS384, RS512, ES256, ES384, ES512, PS256, PS384, PS512
OpenID4VP.SigningAlgorithm=RS256

# ============================================================================
# Verification Configuration
# ============================================================================

# Enable credential verification (default: true)
# When enabled, submitted credentials will be verified
OpenID4VP.VerificationEnabled=true

# Enable revocation checking (default: false)
# When enabled, credentials will be checked against revocation lists
OpenID4VP.RevocationCheckEnabled=false

# ============================================================================
# Supported Credential Formats
# ============================================================================

# Comma-separated list of supported VC formats
# Supported: jwt_vp_json, jwt_vc_json, ldp_vp, ldp_vc, vc+sd-jwt, mso_mdoc
OpenID4VP.SupportedVCFormats=jwt_vp_json,jwt_vc_json,ldp_vp,ldp_vc,vc+sd-jwt

# ============================================================================
# Trusted Issuers Configuration
# ============================================================================

# Comma-separated list of trusted issuer DIDs or URLs
# If empty, all issuers are trusted (not recommended for production)
# OpenID4VP.TrustedIssuers=did:web:example.com,https://issuer.example.com

# ============================================================================
# Cache Configuration
# ============================================================================

# Cache entry expiry time in seconds (default: 300 = 5 minutes)
OpenID4VP.Cache.EntryExpirySeconds=300

# Maximum number of entries in the VP request cache (default: 1000)
OpenID4VP.Cache.MaxEntries=1000

# ============================================================================
# Cleanup Configuration
# ============================================================================

# Enable automatic cleanup of expired requests (default: true)
OpenID4VP.Cleanup.Enabled=true

# Cleanup interval in minutes (default: 5)
OpenID4VP.Cleanup.IntervalMinutes=5

# ============================================================================
# QR Code Configuration
# ============================================================================

# QR code size in pixels (default: 300)
OpenID4VP.QRCode.Size=300

# QR code error correction level: L, M, Q, H (default: M)
OpenID4VP.QRCode.ErrorCorrectionLevel=M
